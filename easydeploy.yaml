# Change this to your actual team name (e.g., org-coretech, org-product)
team: org-product

# Custom URL for your game
subdomain: bitgarden

# @libsql/client is pure JS — no native compilation needed.
# NODEJS_22 kept for compatibility with the rest of the codebase.
runtime: NODEJS_22

# Install all deps, then build the React frontend into frontend/dist
build_command: npm install --prefix backend && npm install --prefix frontend && npm run build --prefix frontend

# Start the Express backend (it serves the frontend/dist static files in production)
start_command: node backend/server.js

# Allow EasyDeploy to dynamically assign the port
port: 8080

# Turso database credentials
env_vars:
  NODE_ENV: production
